# ===================================
# SERVER
# ===================================
server.port=8080

# ===================================
# DATASOURCE - MariaDB
# ===================================
spring.datasource.url=jdbc:mariadb://localhost:3306/ecommerce_dev?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=EcommerceHikariPool-Dev
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===================================
# FLYWAY
# ===================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# ===================================
# REDIS
# ===================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms

# ===================================
# CACHE
# ===================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ===================================
# JWT
# ===================================
app.jwt.secret=ThisIsAVeryLongSecretKeyForDevelopmentEnvironmentOnlyMustChangeInProduction12345678
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=604800000

# ===================================
# CORS
# ===================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===================================
# SWAGGER / OPENAPI
# ===================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ===================================
# LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.locnguyen.ecommerce=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.flywaydb=INFO
