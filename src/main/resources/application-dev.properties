# ===================================
# SERVER
# ===================================
server.port=8080

# ===================================
# DATASOURCE - MariaDB
# ===================================
spring.datasource.url=jdbc:mariadb://localhost:3306/ecommerce_dev?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=0986045812a
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=EcommerceHikariPool-Dev
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===================================
# FLYWAY
# ===================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# ===================================
# REDIS
# ===================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms

# ===================================
# CACHE
# ===================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ===================================
# JWT
# ===================================
app.jwt.secret=ThisIsAVeryLongSecretKeyForDevelopmentEnvironmentOnlyMustChangeInProduction12345678
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=604800000

# ===================================
# AUTH REFRESH COOKIE
# ===================================
app.auth.refresh-cookie.name=fashion-shop.refresh-token
app.auth.refresh-cookie.path=/api/v1/auth
app.auth.refresh-cookie.same-site=Lax
app.auth.refresh-cookie.secure=false
app.auth.refresh-cookie.http-only=true
app.auth.refresh-cookie.max-age=604800

# ===================================
# CORS
# ===================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# ===================================
# SWAGGER / OPENAPI
# ===================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ===================================
# LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.locnguyen.ecommerce=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.flywaydb=INFO

# ===================================
# INVENTORY
# ===================================
app.inventory.expired-check-interval=300000

# ===================================
# SECURITY (refresh-token + CSRF)
# ===================================
app.security.refresh-token-body-fallback-enabled=false
app.security.csrf-double-submit-enabled=false

# ===================================
# PAYMENT (mock provider dev only)
# ===================================
app.payment.mock.enabled=false
app.payment.base-callback-url=http://localhost:8080/api/v1/payments
app.payment.default-return-url=http://localhost:3000/payment/result

# ===================================
# PAYMENT MOMO - TEST
# ===================================
app.payment.momo.enabled=${APP_PAYMENT_MOMO_ENABLED:false}
app.payment.momo.environment=${APP_PAYMENT_MOMO_ENVIRONMENT:TEST}
app.payment.momo.partner-code=${APP_PAYMENT_MOMO_PARTNER_CODE:}
app.payment.momo.access-key=${APP_PAYMENT_MOMO_ACCESS_KEY:}
app.payment.momo.secret-key=${APP_PAYMENT_MOMO_SECRET_KEY:}
app.payment.momo.create-url=${APP_PAYMENT_MOMO_CREATE_URL:https://test-payment.momo.vn/v2/gateway/api/create}
app.payment.momo.redirect-url=${APP_PAYMENT_MOMO_REDIRECT_URL:http://localhost:5173/payment/momo/return}
app.payment.momo.ipn-url=${APP_PAYMENT_MOMO_IPN_URL:}
app.payment.momo.request-type=${APP_PAYMENT_MOMO_REQUEST_TYPE:captureWallet}
app.payment.momo.lang=${APP_PAYMENT_MOMO_LANG:vi}
app.payment.momo.connect-timeout-ms=${APP_PAYMENT_MOMO_CONNECT_TIMEOUT_MS:30000}
app.payment.momo.read-timeout-ms=${APP_PAYMENT_MOMO_READ_TIMEOUT_MS:30000}

# ===================================
# PAYMENT PAYPAL - SANDBOX
# ===================================
app.payment.paypal.enabled=${APP_PAYMENT_PAYPAL_ENABLED:false}
app.payment.paypal.environment=${APP_PAYMENT_PAYPAL_ENVIRONMENT:SANDBOX}
app.payment.paypal.client-id=${APP_PAYMENT_PAYPAL_CLIENT_ID:}
app.payment.paypal.client-secret=${APP_PAYMENT_PAYPAL_CLIENT_SECRET:}
app.payment.paypal.base-url=${APP_PAYMENT_PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
app.payment.paypal.return-url=${APP_PAYMENT_PAYPAL_RETURN_URL:http://localhost:5173/payment/paypal/return}
app.payment.paypal.cancel-url=${APP_PAYMENT_PAYPAL_CANCEL_URL:http://localhost:5173/payment/paypal/cancel}
app.payment.paypal.webhook-id=${APP_PAYMENT_PAYPAL_WEBHOOK_ID:}
app.payment.paypal.currency=${APP_PAYMENT_PAYPAL_CURRENCY:USD}
# Enable ONLY for sandbox testing converts VND order amounts to USD using the rate below.
# NEVER enable in production. Use a proper currency conversion service instead.
app.payment.paypal.test-conversion-enabled=${APP_PAYMENT_PAYPAL_TEST_CONVERSION_ENABLED:true}
app.payment.paypal.test-conversion-rate-vnd-to-usd=${APP_PAYMENT_PAYPAL_TEST_CONVERSION_RATE:25000}
app.payment.paypal.connect-timeout-ms=${APP_PAYMENT_PAYPAL_CONNECT_TIMEOUT_MS:30000}
app.payment.paypal.read-timeout-ms=${APP_PAYMENT_PAYPAL_READ_TIMEOUT_MS:30000}

# ===================================
# OTP (forgot/reset password)
# ===================================
app.otp.expires-minutes=5
app.otp.max-attempts=5
app.otp.resend-cooldown-seconds=60
app.otp.send-limit-window-minutes=15
app.otp.send-limit-max=5
app.reset-token.expires-minutes=10
