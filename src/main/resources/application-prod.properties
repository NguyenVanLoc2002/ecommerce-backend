# ===================================
# SERVER
# ===================================
server.port=${SERVER_PORT:8080}

# ===================================
# DATASOURCE - MariaDB
# ===================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=EcommerceHikariPool-Prod
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===================================
# FLYWAY
# ===================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# ===================================
# REDIS
# ===================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=4

# ===================================
# CACHE
# ===================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ===================================
# JWT
# ===================================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRY:3600000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRY:604800000}

# ===================================
# CORS
# ===================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# ===================================
# SWAGGER / OPENAPI - DISABLED IN PROD
# ===================================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ===================================
# LOGGING
# ===================================
logging.level.root=WARN
logging.level.com.locnguyen.ecommerce=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# ===================================
# ACTUATOR (health + metrics, no full exposure)
# ===================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=SUPER_ADMIN,ADMIN
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=@project.version@

# ===================================
# HIKARICP MONITORING
# ===================================
management.metrics.enable.hikaricp=true

# ===================================
# CONNECTION POOL TUNING
# ===================================
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000

# ===================================
# HTTP / SERVER HARDENING
# ===================================
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
server.error.include-stacktrace=never
server.error.include-message=never
